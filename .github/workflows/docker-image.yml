name: Docker Image CI

on:
  push:
    tags:
      - '*'
jobs:
  build:
    name: Build and Push to Github
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Check out the repo
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}
        
    - name: setup jdk 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        
    - name: build app
      run: |
        mvn dependency:go-offline
        mvn clean package 
      env:
        GITHUB_TOKEN: ${{ secrets.PRIVATE_MAVEN_PACKAGES_PAT }}

    - name: Login to Github Registry
      uses: docker/login-action@v1
      with: 
        registry: ghcr.io
        username: ${{github.actor}}
        password: ${{ github.token }}
        
    - name: Create Image and Push to Github Registry
      run: |
        docker build . --file Dockerfile --tag ghcr.io/opencdmp/repository-deposit-dspace:${{ github.ref_name }}
        docker push ghcr.io/opencdmp/repository-deposit-dspace:${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ github.token }}
